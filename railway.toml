[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
root = "."

[deploy]
# Saturday 07:30 UTC = 08:30 Brussels (winter CET)
# In summer (CEST, after last Sunday of March): this becomes 09:30 Brussels
# To keep 08:30 in summer, change to "30 6 * * 6"
cronSchedule = "30 8 * * 6"
restartPolicyType = "NEVER"
